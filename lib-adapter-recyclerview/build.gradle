apply plugin: 'com.android.library'
apply plugin: 'com.novoda.bintray-release'

android {
    compileSdkVersion 28
    defaultConfig {
        minSdkVersion 14
        targetSdkVersion 28
        versionCode 3
        versionName "1.1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'com.android.support:recyclerview-v7:28.0.0'
}

publish {
    // 配置说明：https://blog.csdn.net/droyon/article/details/77751033
    bintrayUser = '${BINTRAY_USER}'
    bintrayKey = '${BINTRAY_API_KEY}'
    autoPublish = true

    userOrg = '${BINTRAY_USER_ORG}'
    repoName = 'maven'
    uploadName = 'lib-android-adapter'

    groupId = 'com.csp'
    artifactId = 'adapter.recyclerview'
    publishVersion = '1.1.0'
    licences = 'Apache-2.0' // 标识符参考：https://spdx.org/licenses/

    desc = 'Android RecyclerView 通用适配器，支持多布局、单布局、头尾布局'
    website = 'https://github.com/jefshi/lib-android-adapter'
    // issueTracker，如果 website 包含'github.com'，则默认为 '${website}/issues'
}
